name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake gcc perl

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --output-on-failure --test-dir build

  docker-root:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t rebound:root .

      - name: Test binary runs
        run: docker run --rm rebound:root /bin/echo hello

  docker-musl:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -f docker/Dockerfile.musl -t rebound:musl .

      - name: Test binary runs
        run: docker run --rm rebound:musl /bin/echo hello

  docker-scratch:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -f docker/Dockerfile.scratch -t rebound:scratch .

  docker-libc:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -f docker/Dockerfile.libc -t rebound:libc .

      - name: Test binary runs
        run: docker run --rm rebound:libc /bin/echo hello
